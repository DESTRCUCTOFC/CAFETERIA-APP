<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Cafetería Universitaria</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="CSS/styles.css" />
    <style>
      .divider {
        position: relative;
      }
      .divider hr {
        margin: 0;
      }
      .divider span {
        background-color: white;
        padding: 0 0.75rem;
        color: var(--ug-muted);
        font-size: 0.8rem;
      }
      .guest-btn {
        transition: all 0.2s ease;
      }
      .guest-btn:hover {
        transform: translateY(-2px);
      }
      #message {
        border-radius: 2rem;
        padding: 0.6rem 1rem;
      }
    </style>
  </head>
  <body class="auth-page">
    <div class="auth-wrapper d-flex align-items-center">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-12 col-md-6 col-lg-5">
            <div class="login-card auth-card card shadow-sm border-0">
              <div class="card-body p-4 p-md-5 text-center">
                <div class="brand-badge mx-auto mb-3">
                  <img
                    src="assets/Logotipo-UG.png"
                    alt="Logo UG"
                    style="width: 48px; height: 48px; object-fit: contain"
                  />
                </div>
                <h2 class="h4 fw-bold mb-1">Cafetería Universitaria</h2>
                <p class="text-muted small mb-4">
                  Accede con tu cuenta institucional
                </p>





                <div id="message"></div>













                <div id="login-form">
                  <div class="mb-3 text-start">
                    <label class="form-label small fw-semibold"
                      >Correo institucional</label
                    >
                    <input
                      type="email"
                      id="email"
                      class="form-control"
                      placeholder="nombre@ugto.mx"
                      required
                    />
                  </div>
                  <div class="mb-3 text-start">
                    <label class="form-label small fw-semibold"
                      >Contraseña</label
                    >
                    <input
                      type="password"
                      id="password"
                      class="form-control"
                      placeholder="••••••••"
                      required
                    />
                  </div>
                  
                  
                  
                  
                  
                  
                  
                  
                  
                  
                  
                  
                  
                  
                  
                  <button
                  
                    id="iniciarSesionBtn"
                    class="btn btn-primary w-100 py-2 fw-semibold"
                  >
                    Entrar
                  </button>
                
                
                
                
                
                
                
                
                
                
                </div>

                <div class="divider position-relative my-4">
                  <hr />
                  <span
                    class="position-absolute top-50 start-50 translate-middle bg-white px-3 text-muted small"
                    >O</span
                  >
                </div>














                <!-- Mismo botón invitado con clase guest-btn -->
                <button
                  class="guest-btn btn btn-outline-secondary w-100 mb-3"
                  id="entarComoInvitadoBtn">
                  Comprar sin iniciar sesión
                </button>
























                <hr class="my-3" />

                <!-- Enlace a registro -->
                <p class="small mb-0">
                  ¿Eres nuevo? <a href="register.html">Crea una cuenta aquí</a>
                </p>

              </div>
            </div>
          </div>
        </div>
      </div>
    </div>



    <script type="module" src="./js/login.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
