<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro Estudiantes - Cafetería</title>
    <link rel="stylesheet" href="CSS/styles.css">
</head>
<body>
    <div class="login-card">
        <h2>Crear Cuenta de Estudiante</h2>
        <input type="text" id="name" placeholder="Nombre completo">
        <input type="email" id="email" placeholder="Correo institucional">
        <input type="password" id="password" placeholder="Crea una contraseña">
        
        <button onclick="registrarEstudiante()">Registrarse</button>
        
        <p>¿Ya tienes cuenta? <a href="login.html">Inicia sesión aquí</a></p>
        <p id="message"></p>
    </div>
    <script src="js/register.js"></script>
</body>
</html>
